<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andrew Vo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: white; font-family: sans-serif; }
    nav { display: flex; justify-content: space-between; align-items: flex-start; padding: 24px; gap: 12px; }
    nav p { font-size: 14px; }
    nav a { font-size: 14px; text-decoration: underline; color: black; white-space: nowrap; }
    main { display: flex; justify-content: center; padding: 48px 24px; }
    .about { max-width: 600px; width: 100%; }
    .about h1 { font-size: 24px; margin-bottom: 16px; }
    .about p { font-size: 16px; line-height: 1.6; }
    .about a { font-size: 16px; color: black; }
    .resume-embed { display: none; margin-top: 24px; width: 100%; height: 800px; border: none; }
    @media (max-width: 480px) {
      nav { flex-direction: column; gap: 8px; padding: 16px; }
      main { padding: 32px 16px; }
      .about h1 { font-size: 20px; }
      .about p { font-size: 15px; }
      .resume-embed { height: 500px; }
    }
  </style>
</head>
<body>
  <nav>
    <p>Hi, this is Andrew Vo. Welcome to my personal website.</p>
    <div style="display:flex;gap:16px;">
      <a href="gallery/gallery.html">Gallery</a>
      <a href="projects/projects.html">Projects</a>
    </div>
  </nav>
  <main>
    <section class="about">
      <h1>About Me</h1>
      <p>I am an embedded software engineer specializing in vehicle software, based in Dallas, TX.</p>
      <p>Outside of work, I enjoy playing guitar, running, weight lifting, and video games.</p>
      <p style="margin-top:16px;"><a href="#" onclick="toggleResume(event)">Resume</a></p>
      <iframe class="resume-embed" id="resumeEmbed" src="resume.pdf"></iframe>
    </section>
  </main>
  <script>
    function toggleResume(e) {
      e.preventDefault();
      const embed = document.getElementById('resumeEmbed');
      const link = e.target;
      const isHidden = embed.style.display === 'none' || embed.style.display === '';
      embed.style.display = isHidden ? 'block' : 'none';
      link.textContent = isHidden ? 'Hide Resume' : 'Resume';
    }
  </script>
</body>
</html>

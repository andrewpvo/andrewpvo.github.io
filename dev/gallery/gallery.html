<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Andrew Vo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: white; font-family: sans-serif; }
    nav { display: flex; justify-content: space-between; align-items: flex-start; padding: 24px; gap: 12px; }
    nav a { font-size: 14px; text-decoration: underline; color: black; white-space: nowrap; }
    main { display: flex; justify-content: center; padding: 48px 24px; }
    .gallery { max-width: 600px; width: 100%; }
    .gallery h1 { font-size: 24px; margin-bottom: 24px; }
    .gallery-grid { display: flex; flex-direction: row; gap: 24px; }
    figure { margin: 0; flex: 1; }
    figure img { width: 100%; max-width: 260px; height: 320px; object-fit: cover; display: block; }
    figcaption { font-size: 14px; color: #555; margin-top: 8px; }
    @media (max-width: 480px) {
      .gallery-grid { flex-direction: column; }
      figure img { max-width: 100%; }
    }
    @media (max-width: 480px) {
      nav { flex-direction: column; gap: 8px; padding: 16px; }
      .gallery h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html">Home</a>
    <div style="display:flex;gap:16px;">
      <a href="../projects/projects.html">Projects</a>
    </div>
  </nav>
  <main>
    <section class="gallery">
      <h1>Gallery</h1>
      <div class="gallery-grid">
        <figure>
          <img src="images/ProfessionalHeadshot_Color.jpg" alt="Professional headshot">
          <figcaption>This is me.</figcaption>
        </figure>
        <figure>
          <img src="images/BaileyInBed.jpg" alt="Bailey in bed">
          <figcaption>Bailey, my childhood dog.</figcaption>
        </figure>
      </div>
    </section>
  </main>
</body>
</html>
